server {
    add_header X-Frame-Options         "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options  "nosniff"                         always;
    add_header X-XSS-Protection        "1; mode=block"                   always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' * 'unsafe-inline' 'unsafe-eval';" always;

    listen      80;
    server_name demoshop-api.smartduuka.com;

    root             /app_demo/public;
    index            index.php index.html;
    disable_symlinks off;

    client_max_body_size    10M;
    fastcgi_read_timeout    60s;
    fastcgi_connect_timeout 60s;
    fastcgi_send_timeout    60s;
    keepalive_timeout       65s;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Tenancy Asset Fix
    location ^~ /tenancy/ {
        alias      /app_demo/storage/app/public/tenancy/;
        access_log off;
        expires    30d;
        add_header Cache-Control            "public, no-transform";
        add_header Access-Control-Allow-Origin "*";
        try_files  $uri                     =404;
    }

    location ^~ /media/ {
        root       /app_demo/public;
        access_log off;
        expires    30d;
        add_header Cache-Control "public, no-transform";
        try_files  $uri          $uri/                  =404;
    }

    location ^~ /storage/ {
        alias      /app_demo/storage/app/public/;
        access_log off;
        expires    30d;
        add_header Cache-Control            "public, no-transform";
        try_files  $uri                     =404;
    }

    location ~ \.php$ {
        include       fastcgi_params;
        fastcgi_pass  unix:/var/run/php_demo/php-fpm.sock; #[cite: 1, 5]
        fastcgi_param SCRIPT_FILENAME /app_demo/public$fastcgi_script_name; #[cite: 1, 5]
        fastcgi_param HTTPS           $https if_not_empty;
    }
}

server {
    add_header X-Frame-Options         "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options  "nosniff"                         always;
    add_header X-XSS-Protection        "1; mode=block"                   always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' * 'unsafe-inline' 'unsafe-eval';" always;

    listen      443 ssl;
    server_name demoshop-api.smartduuka.com;

    root             /app_demo/public;
    index            index.php index.html;
    disable_symlinks off;

    ssl_certificate     /etc/nginx/ssl/cert.pem; #[cite: 1, 2]
    ssl_certificate_key /etc/nginx/ssl/key.key;  #[cite: 1, 2]

    client_max_body_size    10M;
    fastcgi_read_timeout    60s;
    fastcgi_connect_timeout 60s;
    fastcgi_send_timeout    60s;
    keepalive_timeout       65s;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Tenancy Asset Fix[cite: 5]
    location ^~ /tenancy/ {
        alias      /app_demo/storage/app/public/tenancy/;
        access_log off;
        expires    30d;
        add_header Cache-Control            "public, no-transform";
        add_header Access-Control-Allow-Origin "*";
        try_files  $uri                     =404;
    }

    location ^~ /media/ {
        root       /app_demo/public;
        access_log off;
        expires    30d;
        add_header Cache-Control               "public, no-transform";
        add_header Access-Control-Allow-Origin "*";
        try_files  $uri                        $uri/                  =404;
    }

    location ^~ /storage/ {
        alias      /app_demo/storage/app/public/;
        access_log off;
        expires    30d;
        add_header Cache-Control            "public, no-transform";
        try_files  $uri                     =404;
    }

    location /app {
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_pass http://api_demo:8080; #[cite: 3, 5]
    }

    location ~ \.php$ {
        include       fastcgi_params;
        fastcgi_pass  unix:/var/run/php_demo/php-fpm.sock; #
        fastcgi_param SCRIPT_FILENAME /app_demo/public$fastcgi_script_name; #[cite: 1, 5]
        fastcgi_param HTTPS           on;
    }
}